services:
  backend:
    build:
      context: ../backend

    container_name: netra-backend

    ports:
      - "8000:8000"

    volumes:
      - ../backend:/app

    env_file:
      - ../backend/.env

    depends_on:
      - postgres

    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  postgres:
    image: postgres:16

    container_name: netra-postgres

    restart: always

    environment:
      POSTGRES_DB: netra
      POSTGRES_USER: netra_user
      POSTGRES_PASSWORD: netra_password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: