services:
  frontend:
    build:
      context: ../frontend

    container_name: netra-frontend

    ports:
      - "3000:3000"

    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules

    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
      BACKEND_URL_INTERNAL: http://backend:8000
      NETRA_DOCKER: "true"

    depends_on:
      - backend

  backend:
    build:
      context: ../backend

    container_name: netra-backend

    ports:
      - "8000:8000"

    volumes:
      - ../backend:/app

    env_file:
      - ../backend/.env

    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis

    depends_on:
      - postgres
      - redis
      - chromadb

    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  postgres:
    image: postgres:16

    container_name: netra-postgres

    restart: always

    environment:
      POSTGRES_DB: netra
      POSTGRES_USER: netra_user
      POSTGRES_PASSWORD: netra_password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

    container_name: netra-redis

    restart: always

    ports:
      - "6379:6379"

  chromadb:
    image: chromadb/chroma:latest

    container_name: netra-chromadb

    restart: always

    ports:
      - "8001:8000"

    volumes:
      - chroma_data:/chroma/chroma

volumes:
  postgres_data:
  chroma_data:
  frontend_node_modules:
